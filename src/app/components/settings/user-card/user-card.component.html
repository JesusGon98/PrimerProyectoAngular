<mat-card class="mb-6">
  <mat-card-header class="bg-slate-50 px-4 py-3 rounded-t-lg">
    <mat-icon mat-card-avatar class="text-slate-600">account_circle</mat-icon>
    <mat-card-title class="text-slate-800">Perfil de usuario</mat-card-title>
  </mat-card-header>

  <mat-card-content class="px-4 pt-4 flex flex-col gap-4">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nombre</mat-label>
      <mat-icon matPrefix>person</mat-icon>
      <input matInput [(ngModel)]="editedName" placeholder="Tu nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Correo electrónico</mat-label>
      <mat-icon matPrefix>email</mat-icon>
      <input matInput [(ngModel)]="editedEmail" placeholder="tu@correo.com" />
    </mat-form-field>
  </mat-card-content>

  <mat-card-actions class="px-4 pb-3 flex justify-end">
    <button mat-flat-button (click)="onSave()">
      <mat-icon>save</mat-icon>
      Guardar perfil
    </button>
  </mat-card-actions>
</mat-card>
